<!DOCTYPE html>

<head>

    .thank-you-section {

      padding: 3rem 1.5rem;
    }
    .thank-you-section .section-title {

    }
    .thank-you-section p {

      margin-bottom: 1.5rem;
    }
    .thank-you-section a {
      display: inline-block;
      margin-top: 1rem;

      background: var(--color-accent);
      color: var(--color-bg);
      text-decoration: none;
      border-radius: var(--radius);
      font-weight: 500;
